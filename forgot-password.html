<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KurdJobs — Forgot Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT:'#0B1628', light:'#13203A', lighter:'#1A2D4D' },
            action: { DEFAULT:'#0055FF', hover:'#0044CC', light:'#E8F1FF' },
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #F7F9FC; }
    .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="max-w-md w-full glass bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
    <!-- Logo -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-12 h-12 rounded-xl bg-action flex items-center justify-center mb-3">
        <i class="fa-solid fa-key text-white text-xl"></i>
      </div>
      <h2 class="text-2xl font-bold text-navy">ژبیرکرنا وشەیا نهێنی</h2>
      <p class="text-gray-500 text-sm mt-2 text-center">ئیمەیڵێ خۆ بنڤێسە دا کو لینکا گۆڕینا وشەیا نهێنی بۆ تە بهێتە فڕێکرن.</p>
    </div>

    <form id="resetForm" class="space-y-5">
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">ئیمەیڵ (Email)</label>
        <div class="relative">
          <i class="fa-solid fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
          <input type="email" id="resetEmail" required 
            class="w-full border border-gray-200 rounded-xl pl-10 pr-4 py-3 text-sm focus:ring-2 focus:ring-action/20 focus:border-action outline-none transition-all" 
            placeholder="example@email.com">
        </div>
      </div>

      <button type="submit" id="submitBtn" 
        class="w-full bg-action hover:bg-action-hover text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-action/20 flex items-center justify-center gap-2">
        <span>ناردنا لینکێ</span>
        <i class="fa-solid fa-paper-plane text-xs"></i>
      </button>
    </form>

    <div id="statusMsg" class="mt-6 hidden p-4 rounded-xl text-sm text-center"></div>

    <div class="mt-8 pt-6 border-t border-gray-100 text-center">
      <a href="login.html" class="text-sm text-action font-semibold hover:underline flex items-center justify-center gap-2">
        <i class="fa-solid fa-arrow-right text-xs"></i>
        <span>ڤەگەرە بۆ چوونە ژوور (Login)</span>
      </a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Reuse your existing Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyB5nZtGd35Dc-rShXdt29E6iTrIKPkRGac",
      authDomain: "mygameapp-69be7.firebaseapp.com",
      projectId: "mygameapp-69be7",
      storageBucket: "mygameapp-69be7.firebasestorage.app",
      messagingSenderId: "770807145943",
      appId: "1:770807145943:web:593cb35242cf3dfc1d1792"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const resetForm = document.getElementById('resetForm');
    const statusMsg = document.getElementById('statusMsg');
    const submitBtn = document.getElementById('submitBtn');

    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('resetEmail').value;

      // Update button state
      submitBtn.disabled = true;
      submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
      submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> چەڤەڕێ بە...';

      try {
        await sendPasswordResetEmail(auth, email);
        statusMsg.textContent = "لینکا گۆڕینا وشەیا نهێنی بۆ ئیمەیڵێ تە هاتە فڕێکرن. تکایە سندوقا ئیمەیڵێ خۆ (Inbox) پشکنین بکە.";
        statusMsg.className = "mt-6 p-4 rounded-xl text-sm text-center bg-green-50 text-green-700 border border-green-100 block";
        resetForm.reset();
      } catch (error) {
        console.error(error);
        let errorMessage = "کێشەیەک پەیدابوو، تکایە جارەکا دی هەول بدە.";
        if (error.code === 'auth/user-not-found') errorMessage = "ئەڤ ئیمەیڵە نەهاتییە تۆمارکرن.";
        
        statusMsg.textContent = errorMessage;
        statusMsg.className = "mt-6 p-4 rounded-xl text-sm text-center bg-red-50 text-red-700 border border-red-100 block";
      } finally {
        submitBtn.disabled = false;
        submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        submitBtn.innerHTML = '<span>ناردنا لینکێ</span> <i class="fa-solid fa-paper-plane text-xs"></i>';
      }
    });
  </script>
</body>
</html>
