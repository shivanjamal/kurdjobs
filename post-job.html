<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بەلاڤکرنا کاری — KurdJobs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Noto+Sans+Arabic:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans Arabic', 'Plus Jakarta Sans', sans-serif; background-color: #0B1628; color: white; }
    .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    input, select, textarea { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; }
    input:focus, select:focus, textarea:focus { border-color: #0055FF !important; outline: none; box-shadow: 0 0 0 3px rgba(0, 85, 255, 0.15); }
    select option { background-color: #13203A; }
  </style>
</head>
<body class="min-h-screen p-4 md:p-8">
  <div class="max-w-2xl mx-auto">
    <div class="flex items-center justify-between mb-8">
      <a href="index.html" class="flex items-center gap-2 text-gray-400 hover:text-white transition-colors">
        <i class="fa-solid fa-arrow-right"></i>
        <span>ڤەگەر</span>
      </a>
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-[#0055FF] flex items-center justify-center">
          <i class="fa-solid fa-briefcase text-white text-xs"></i>
        </div>
        <span class="font-extrabold text-lg">Kurd<span class="text-[#0055FF]">Jobs</span></span>
      </div>
    </div>

    <div class="glass-card rounded-3xl p-6 md:p-10">
      <h1 id="formTitle" class="text-2xl font-bold mb-2">بەلاڤکرنا کارەکێ نوی</h1>
      <p id="formSubtitle" class="text-gray-400 text-sm mb-8">بگەهە هزاران کەسێن شارەزا ل کوردستانێ.</p>

      <form id="postJobForm" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">ناڤێ کاری</label>
            <input type="text" id="title" required class="w-full rounded-xl py-3 px-4 text-sm" placeholder="بۆ نموونە: ئەندازیارێ سۆفتوێری">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">ناڤێ کۆمپانیایێ</label>
            <input type="text" id="company" required class="w-full rounded-xl py-3 px-4 text-sm" placeholder="کۆمپانیا تە">
          </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">جهـ</label>
            <select id="location" required class="w-full rounded-xl py-3 px-4 text-sm appearance-none">
              <option value="erbil">هەولێر</option>
              <option value="sulaymaniyah">سلێمانی</option>
              <option value="duhok">دهۆک</option>
              <option value="kirkuk">کەرکووک</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">جۆرێ کاری</label>
            <select id="type" required class="w-full rounded-xl py-3 px-4 text-sm appearance-none">
              <option value="full-time">دەمێ تەمام</option>
              <option value="part-time">نیڤ دەم</option>
              <option value="contract">گرێبەست</option>
              <option value="remote">ژ دوور ڤە</option>
            </select>
          </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">کێمترین مووچە</label>
            <input type="number" id="salaryMin" required class="w-full rounded-xl py-3 px-4 text-sm" placeholder="1000">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">زۆرترین مووچە</label>
            <input type="number" id="salaryMax" required class="w-full rounded-xl py-3 px-4 text-sm" placeholder="2000">
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">دراڤ (دراو)</label>
            <select id="currency" required class="w-full rounded-xl py-3 px-4 text-sm appearance-none">
              <option value="USD">Dollar ($)</option>
              <option value="IQD">Dinar (د.ع)</option>
            </select>
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">لۆگۆیا کۆمپانیایێ</label>
          <div class="border-2 border-dashed border-white/10 rounded-xl p-6 text-center hover:border-blue-500/40 transition-colors cursor-pointer" onclick="this.querySelector('input').click()">
            <input type="file" id="companyLogo" class="hidden" accept="image/*">
            <i class="fa-solid fa-cloud-arrow-up text-white/30 text-xl mb-2"></i>
            <p class="text-xs text-gray-400">کلیک بکە بۆ بلندکرنا لۆگۆ (PNG, JPG, SVG)</p>
          </div>
        </div>
        <button type="submit" id="submitBtn" class="w-full bg-[#0055FF] hover:bg-blue-600 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-500/25">
          نوکە کارێ بەلاڤ بکە
        </button>
      </form>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, updateDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB5nZtGd35Dc-rShXdt29E6iTrIKPkRGac",
      authDomain: "mygameapp-69be7.firebaseapp.com",
      projectId: "mygameapp-69be7",
      storageBucket: "mygameapp-69be7.firebasestorage.app",
      messagingSenderId: "770807145943",
      appId: "1:770807145943:web:593cb35242cf3dfc1d1792"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // Check for edit mode
    const urlParams = new URLSearchParams(window.location.search);
    const editId = urlParams.get('edit');

    onAuthStateChanged(auth, async (user) => { 
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      
      // Check if user is an employer
      const userDoc = await getDoc(doc(db, "users", user.uid));
      if (!userDoc.exists() || userDoc.data().role !== 'employer') {
        alert("ب تنێ خودان کار (Admins) دشێن کاران بەلاڤ بکەن.");
        window.location.href = 'index.html';
      }

      // Load existing job data if in edit mode
      if (editId) {
        const jobDoc = await getDoc(doc(db, "jobs", editId));
        if (jobDoc.exists()) {
          const data = jobDoc.data();
          // Security check: ensure the owner is editing their own job
          if (data.userId !== user.uid) {
            alert("تۆ نەشێی ڤی کاری بگۆهۆڕی.");
            window.location.href = 'admin-dashboard.html';
            return;
          }
          
          document.getElementById('formTitle').innerText = 'گۆهۆڕینا کارێ بەلاڤکری';
          document.getElementById('submitBtn').innerText = 'نووژەنکرنا زانیارییان';
          document.getElementById('title').value = data.title.en;
          document.getElementById('company').value = data.company.en;
          document.getElementById('location').value = data.locationKey;
          document.getElementById('type').value = data.type;
          document.getElementById('salaryMin').value = data.salaryMin || '';
          document.getElementById('salaryMax').value = data.salaryMax || '';
          document.getElementById('currency').value = data.currency || 'USD';
          // No direct way to pre-fill file input, but we can store the current logo URL
          // and use it if no new file is uploaded.
          document.getElementById('companyLogo').dataset.currentLogoUrl = data.logoUrl || '';
        }
      }
    });

    document.getElementById('postJobForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const logoFile = document.getElementById('companyLogo').files[0];
      let logoUrl = document.getElementById('companyLogo').dataset.currentLogoUrl || ''; // Get existing logo URL if editing

      try {
        btn.disabled = true; 
        btn.innerText = editId ? 'دهێتە نووژەنکرن...' : 'دهێتە بەلاڤکرن...';

        // Upload new logo if selected
        if (logoFile) {
          const logoRef = ref(storage, `company_logos/${Date.now()}_${logoFile.name}`);
          await uploadBytes(logoRef, logoFile);
          logoUrl = await getDownloadURL(logoRef);
        }

      const jobData = {
        title: { en: document.getElementById('title').value },
        company: { en: document.getElementById('company').value },
        locationKey: document.getElementById('location').value,
        type: document.getElementById('type').value,
        salaryMin: document.getElementById('salaryMin').value,
        salaryMax: document.getElementById('salaryMax').value,
        currency: document.getElementById('currency').value,
        logoUrl: logoUrl, // Add logo URL to job data
        createdAt: serverTimestamp(),
        userId: auth.currentUser.uid
      };
        
        if (editId) {
          await updateDoc(doc(db, "jobs", editId), jobData);
          alert('کار ب سەرکەفتی هاتە نووژەنکرن!');
        } else {
          await addDoc(collection(db, "jobs"), jobData);
          alert('کار ب سەرکەفتی هاتە بەلاڤکرن!');
        }
        window.location.href = 'admin-dashboard.html';
      } catch (error) { alert('Error: ' + error.message); btn.disabled = false; btn.innerText = 'پێشکێشکرن دووبارە بکە'; }
    });
  </script>
</body>
</html>
