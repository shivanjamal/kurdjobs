<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>داواکاریێن من — KurdJobs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans Arabic', sans-serif; background-color: #0B1628; color: white; }
    .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .status-pending { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.2); }
    .status-reviewed { background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }
    .status-rejected { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
    .status-hired { background: #0055FF; color: white; border: 1px solid #0055FF; }
    .badge-step {
      padding: 2px 10px; border-radius: 99px; font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
  </style>
</head>
<body class="min-h-screen p-3 md:p-6">
  <div class="max-w-4xl mx-auto">
    <!-- Header -->
    <div class="flex items-center gap-3 mb-6">
      <a href="index.html" class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center text-white hover:bg-white/10 transition-all">
        <i class="fa-solid fa-arrow-right"></i>
      </a>
      <div>
        <h1 class="text-2xl font-bold">داواکاریێن من</h1>
        <p class="text-gray-400 text-sm">بەدواداچوونا کارێن تە داخوازی پێشکێش کری</p>
      </div>
    </div>

    <!-- Applications List -->
    <div class="glass-card rounded-3xl overflow-hidden">
      <div id="myAppsList" class="divide-y divide-white/5">
        <div class="p-20 text-center text-gray-500">
          <i class="fa-solid fa-spinner fa-spin text-2xl mb-4"></i>
          <p>دهێتە بارکرن...</p>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, doc, getDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB5nZtGd35Dc-rShXdt29E6iTrIKPkRGac",
      authDomain: "mygameapp-69be7.firebaseapp.com",
      projectId: "mygameapp-69be7",
      storageBucket: "mygameapp-69be7.firebasestorage.app",
      messagingSenderId: "770807145943",
      appId: "1:770807145943:web:593cb35242cf3dfc1d1792"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = 'login.html';
      } else {
        loadMyApplications(user.uid);
      }
    });

    async function loadMyApplications(uid) {
      const list = document.getElementById('myAppsList');
      try {
        // Fetch applications for this seeker
        const q = query(collection(db, "applications"), where("seekerId", "==", uid), orderBy("appliedAt", "desc"));
        const snapshot = await getDocs(q);

        if (snapshot.empty) {
          list.innerHTML = '<div class="p-20 text-center text-gray-500">تە هێشتا داخوازی بۆ چ کاران پێشکێش نەکرییە.</div>';
          return;
        }

        // پشکنین کا ئایا چو کارەکێ 'hired' هەیە؟
        const hiredApp = snapshot.docs.find(d => d.data().status === 'hired');
        const displayDocs = hiredApp ? [hiredApp] : snapshot.docs;

        if (hiredApp) {
          list.innerHTML = '<div class="p-4 bg-blue-500/10 border border-blue-500/20 rounded-xl mb-4 text-center text-blue-400 text-sm font-bold">پیرۆزە! تۆ هاتیتە وەرگرتن. هەمی داخوازیێن دی هاتنە ڕاوستاندن.</div>';
        } else {
          list.innerHTML = '';
        }

        let html = '';
        for (const appDoc of displayDocs) {
          const appData = appDoc.data();
          const status = appData.status || 'pending';
          
          // Fetch job title
          const jobDoc = await getDoc(doc(db, "jobs", appData.jobId));
          const jobTitle = jobDoc.exists() ? jobDoc.data().title.en : "کار هاتە ژێبرن";
          const jobLogoUrl = jobDoc.exists() ? jobDoc.data().logoUrl : null;
          const companyName = jobDoc.exists() ? jobDoc.data().company.en : "-";

          let statusBadge = '';
          if(status === 'reviewed') {
            statusBadge = '<span class="badge-step status-reviewed">Reviewed</span>';
          } else if(status === 'hired') {
            statusBadge = '<span class="badge-step status-hired">Hired</span>';
          } else if(status === 'rejected') {
            statusBadge = '<span class="badge-step status-rejected">Rejected</span>';
          } else {
            statusBadge = '<span class="badge-step status-pending">Pending</span>';
          }

          html += `
            <div class="p-3 md:p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-3 hover:bg-white/[0.02] transition-all border-b border-white/5 last:border-0">
              <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-lg bg-white/5 border border-white/5 flex items-center justify-center text-white/30 shrink-0 overflow-hidden">
                  ${jobLogoUrl ? `<img src="${jobLogoUrl}" alt="${companyName} logo" class="w-full h-full object-cover">` : `<i class="fa-solid fa-briefcase text-base"></i>`}
                </div>
                <div class="min-w-0">
                  <h3 class="font-bold text-white text-sm md:text-base leading-tight truncate">${jobTitle}</h3>
                  <p class="text-gray-400 text-[11px] font-medium mb-1">${companyName}</p>
                  <div class="flex items-center gap-1.5 text-[10px] text-gray-500 bg-white/5 w-fit px-1.5 py-0.5 rounded">
                    <i class="fa-regular fa-calendar-check"></i>
                    <span>هاتیە پێشکێشکرن: ${appData.appliedAt ? appData.appliedAt.toDate().toLocaleDateString() : 'Just now'}</span>
                  </div>
                </div>
              </div>
              <div class="flex sm:block justify-end shrink-0">
                ${statusBadge}
              </div>
            </div>
          `;
        }
        list.innerHTML = html;
      } catch (error) {
        console.error("Error:", error);
        list.innerHTML = `<div class="p-10 text-center text-red-400">کێشەیەک پەیدابوو: ${error.message}</div>`;
      }
    }
  </script>
</body>
</html>
