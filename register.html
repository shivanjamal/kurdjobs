<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — KurdJobs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0B1628; }
    .login-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    input:focus { border-color: #0055FF !important; box-shadow: 0 0 0 3px rgba(0, 85, 255, 0.15); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <!-- Logo Area -->
    <div class="text-center mb-8">
      <a href="index.html" class="inline-flex items-center gap-2.5">
        <div class="w-10 h-10 rounded-xl bg-[#0055FF] flex items-center justify-center shadow-lg shadow-blue-500/20">
          <i class="fa-solid fa-briefcase text-white text-lg"></i>
        </div>
        <span class="text-white font-extrabold text-2xl tracking-tight">Kurd<span class="text-[#0055FF]">Jobs</span></span>
      </a>
    </div>

    <!-- Card -->
    <div class="login-card rounded-3xl p-8 shadow-2xl">
      <h1 class="text-2xl font-bold text-white mb-2">Create Account</h1>
      <p class="text-gray-400 text-sm mb-8">Join the #1 job platform in Kurdistan.</p>

      <form class="space-y-5" id="registerForm">
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Full Name</label>
          <div class="relative">
            <i class="fa-regular fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
            <input type="text" id="regName" required 
              class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-11 pr-4 text-white text-sm transition-all focus:outline-none placeholder:text-gray-600"
              placeholder="Ahmed Muhammad">
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Email Address</label>
          <div class="relative">
            <i class="fa-regular fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
            <input type="email" id="regEmail" required 
              class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-11 pr-4 text-white text-sm transition-all focus:outline-none placeholder:text-gray-600"
              placeholder="name@company.com">
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Password</label>
          <div class="relative">
            <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
            <input type="password" id="regPassword" required 
              class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-11 pr-4 text-white text-sm transition-all focus:outline-none placeholder:text-gray-600"
              placeholder="••••••••">
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Account Type</label>
          <select id="regRole" required 
            class="w-full bg-white/5 border border-white/10 rounded-xl py-3 px-4 text-white text-sm transition-all focus:outline-none cursor-pointer">
            <option value="seeker" class="bg-[#0B1628]">Job Seeker (داخوازکارێ کاری)</option>
            <option value="employer" class="bg-[#0B1628]">Employer / Admin (خودان کار)</option>
          </select>
        </div>

        <button type="submit" id="regBtn"
          class="w-full bg-[#0055FF] hover:bg-blue-600 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-blue-500/25 active:scale-[0.98]">
          Create Account
        </button>
      </form>

      <!-- Divider -->
      <div class="relative my-8">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
        <div class="relative flex justify-center text-xs uppercase"><span class="bg-[#0B1628] px-2 text-gray-500">Or sign up with</span></div>
      </div>

      <!-- Social Login -->
      <div class="grid grid-cols-2 gap-4">
        <button onclick="loginWithGoogle()" class="flex items-center justify-center gap-2 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl py-2.5 transition-all">
          <i class="fa-brands fa-google text-white text-sm"></i>
          <span class="text-white text-sm font-semibold">Google</span>
        </button>
        <button onclick="loginWithFacebook()" class="flex items-center justify-center gap-2 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl py-2.5 transition-all">
          <i class="fa-brands fa-facebook-f text-white text-sm"></i>
          <span class="text-white text-sm font-semibold">Facebook</span>
        </button>
      </div>
    </div>

    <p class="text-center mt-8 text-gray-500 text-sm">
      Already have an account? 
      <a href="login.html" class="text-[#0055FF] font-bold hover:underline">Sign In</a>
    </p>

    <div class="mt-12 text-center">
      <a href="index.html" class="text-gray-500 hover:text-white text-xs transition-colors flex items-center justify-center gap-2">
        <i class="fa-solid fa-arrow-left"></i>
        Back to Homepage
      </a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, updateProfile, GoogleAuthProvider, signInWithPopup, FacebookAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB5nZtGd35Dc-rShXdt29E6iTrIKPkRGac",
      authDomain: "mygameapp-69be7.firebaseapp.com",
      projectId: "mygameapp-69be7",
      storageBucket: "mygameapp-69be7.firebasestorage.app",
      messagingSenderId: "770807145943",
      appId: "1:770807145943:web:593cb35242cf3dfc1d1792"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('regName').value;
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;
      const role = document.getElementById('regRole').value;
      const btn = document.getElementById('regBtn');

      try {
        btn.disabled = true;
        btn.innerText = 'Creating account...';
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        
        // Save user role in Firestore
        await setDoc(doc(db, "users", userCredential.user.uid), {
          uid: userCredential.user.uid,
          displayName: name,
          role: role,
          email: email
        });

        await updateProfile(userCredential.user, { displayName: name });
        window.location.href = 'index.html';
      } catch (error) {
        alert("Registration failed: " + error.message);
        btn.disabled = false;
        btn.innerText = 'Create Account';
      }
    });

    window.loginWithGoogle = async () => {
      const provider = new GoogleAuthProvider();
      try {
        await signInWithPopup(auth, provider);
        window.location.href = 'index.html';
      } catch (error) {
        alert("Google sign up failed: " + error.message);
      }
    };

    window.loginWithFacebook = async () => {
      const provider = new FacebookAuthProvider();
      try {
        await signInWithPopup(auth, provider);
        window.location.href = 'index.html';
      } catch (error) {
        alert("Facebook login failed: " + error.message);
      }
    };
  </script>
</body>
</html>
